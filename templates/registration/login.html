<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — pyobs Web Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0d1117; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="card border-secondary shadow-lg" style="width:100%;max-width:380px">
  <div class="card-body p-4">

    <div class="text-center mb-4">
      <i class="bi bi-telescope fs-1 text-primary"></i>
      <h5 class="mt-2 mb-0 fw-semibold">pyobs Web Admin</h5>
      <small class="text-muted">Sign in to continue</small>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2">
      <i class="bi bi-exclamation-triangle me-1"></i>Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label" for="id_username">Username</label>
        <input type="text" name="username" id="id_username"
               class="form-control" autofocus autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label class="form-label" for="id_password">Password</label>
        <input type="password" name="password" id="id_password"
               class="form-control" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
      </button>
    </form>

  </div>
</div>

</body>
</html>
