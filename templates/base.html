<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}pyobs Web Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background-color: #1a1d21;
      border-right: 1px solid #2d3035;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease;
    }
    .sidebar-link {
      color: #adb5bd;
      text-decoration: none;
      font-size: 0.875rem;
      border-radius: 6px;
      transition: background-color 0.15s, color 0.15s;
    }
    .sidebar-link:hover  { background-color: #2d3035; color: #f8f9fa; }
    .sidebar-link.active { background-color: #0d6efd20; color: #6ea8fe; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #495057;
      display: inline-block;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }
    .status-dot.running { background: #198754; }
    .status-dot.stopped { background: #dc3545; }
    .status-dot.unknown { background: #495057; }

    /* ── Desktop layout ──────────────────────────────────────────────────────── */
    @media (min-width: 992px) {
      body { overflow: hidden; }
      .sidebar      { height: 100vh; overflow-y: auto; }
      .main-content { height: 100vh; overflow-y: auto; }
    }

    /* ── Mobile layout ───────────────────────────────────────────────────────── */
    @media (max-width: 991.98px) {
      body { overflow-x: hidden; }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        z-index: 1045;
        width: 280px;
        min-width: 280px;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1044;
    }
    .sidebar-overlay.active { display: block; }
  </style>
</head>
<body>

<!-- Mobile top navbar ─────────────────────────────────────────────────────── -->
<nav class="d-lg-none d-flex align-items-center px-3 bg-dark border-bottom border-secondary-subtle sticky-top"
     style="height:52px;z-index:1043">
  <i class="bi bi-telescope text-primary me-2"></i>
  <a href="/" class="text-light fw-semibold text-decoration-none me-auto">pyobs Web Admin</a>
  <button class="btn btn-outline-secondary btn-sm" onclick="toggleSidebar()">
    <i class="bi bi-list fs-5"></i>
  </button>
</nav>

<!-- Sidebar backdrop (mobile) ────────────────────────────────────────────── -->
<div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">

  <nav class="sidebar" id="sidebar">

    <!-- Desktop header -->
    <div class="p-3 border-bottom border-secondary-subtle d-none d-lg-block">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-telescope fs-5 text-primary"></i>
        <div>
          <div class="fw-semibold text-light lh-1">pyobs</div>
          <div class="text-muted" style="font-size:0.7rem">Web Admin</div>
        </div>
      </div>
    </div>

    <!-- Mobile header with close button -->
    <div class="p-3 border-bottom border-secondary-subtle d-flex d-lg-none align-items-center gap-2">
      <i class="bi bi-telescope fs-5 text-primary"></i>
      <div class="me-auto">
        <div class="fw-semibold text-light lh-1">pyobs</div>
        <div class="text-muted" style="font-size:0.7rem">Web Admin</div>
      </div>
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleSidebar()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="p-2 flex-grow-1 overflow-auto">
      <div class="px-2 py-2">
        <a href="{% url 'dashboard' %}" class="sidebar-link d-flex align-items-center gap-2 px-2 py-2 {% if not active_module %}active{% endif %}">
          <i class="bi bi-grid-fill" style="font-size:0.8rem"></i>
          Dashboard
        </a>
      </div>

      <div class="px-2 pb-1">
        <span class="text-uppercase text-muted fw-semibold" style="font-size:0.65rem;letter-spacing:.08em">Modules</span>
      </div>

      {% for mod in sidebar_modules %}
      <a href="{% url 'module_detail' mod %}"
         class="sidebar-link d-flex align-items-center gap-2 px-2 py-2 {% if active_module == mod %}active{% endif %}">
        <span class="status-dot unknown" data-module="{{ mod }}"></span>
        {{ mod }}
      </a>
      {% empty %}
      <p class="text-muted px-2 py-2" style="font-size:0.8rem">No modules found in config dir.</p>
      {% endfor %}
    </div>

  </nav>

  <main class="main-content flex-grow-1 p-3 p-lg-4">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function getCsrfToken() {
  return document.cookie.split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))
    ?.replace('csrftoken=', '') || '';
}

// ── Mobile sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const opening  = !sidebar.classList.contains('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('active');
  document.body.style.overflow = opening ? 'hidden' : '';
}

// Close sidebar when any nav link is followed on mobile
document.querySelectorAll('.sidebar-link').forEach(link => {
  link.addEventListener('click', () => {
    if (window.innerWidth < 992 && document.getElementById('sidebar').classList.contains('open')) {
      toggleSidebar();
    }
  });
});

// ── Status dots ───────────────────────────────────────────────────────────────
async function refreshSidebarStatus() {
  try {
    const resp = await fetch("{% url 'api_all_statuses' %}");
    const data = await resp.json();
    data.modules.forEach(m => {
      document.querySelectorAll(`.status-dot[data-module="${m.name}"]`).forEach(dot => {
        dot.className = `status-dot ${m.status}`;
      });
    });
  } catch (_) {}
}

refreshSidebarStatus();
setInterval(refreshSidebarStatus, 8000);

// ── Preserve active tab hash when navigating between modules ──────────────────
document.querySelectorAll('.sidebar-link[href^="/modules/"]').forEach(link => {
  link.addEventListener('click', function (e) {
    if (location.hash) {
      e.preventDefault();
      window.location.href = this.getAttribute('href').split('#')[0] + location.hash;
    }
  });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
