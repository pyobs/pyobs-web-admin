<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}pyobs Web Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { overflow: hidden; }
    .sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      overflow-y: auto;
      background-color: #1a1d21;
      border-right: 1px solid #2d3035;
    }
    .main-content {
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-link {
      color: #adb5bd;
      text-decoration: none;
      font-size: 0.875rem;
      border-radius: 6px;
      transition: background-color 0.15s, color 0.15s;
    }
    .sidebar-link:hover { background-color: #2d3035; color: #f8f9fa; }
    .sidebar-link.active { background-color: #0d6efd20; color: #6ea8fe; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #495057;
      display: inline-block;
      flex-shrink: 0;
      transition: background-color 0.3s;
    }
    .status-dot.running { background: #198754; }
    .status-dot.stopped { background: #dc3545; }
    .status-dot.unknown { background: #495057; }
  </style>
</head>
<body>
<div class="d-flex">

  <nav class="sidebar d-flex flex-column">
    <div class="p-3 border-bottom border-secondary-subtle">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-telescope fs-5 text-primary"></i>
        <div>
          <div class="fw-semibold text-light lh-1">pyobs</div>
          <div class="text-muted" style="font-size:0.7rem">Web Admin</div>
        </div>
      </div>
    </div>

    <div class="p-2 flex-grow-1">
      <div class="px-2 py-2">
        <a href="{% url 'dashboard' %}" class="sidebar-link d-flex align-items-center gap-2 px-2 py-2 {% if not active_module %}active{% endif %}">
          <i class="bi bi-grid-fill" style="font-size:0.8rem"></i>
          Dashboard
        </a>
      </div>

      <div class="px-2 pb-1">
        <span class="text-uppercase text-muted fw-semibold" style="font-size:0.65rem;letter-spacing:.08em">Modules</span>
      </div>

      {% for mod in sidebar_modules %}
      <a href="{% url 'module_detail' mod %}"
         class="sidebar-link d-flex align-items-center gap-2 px-2 py-2 {% if active_module == mod %}active{% endif %}">
        <span class="status-dot unknown" data-module="{{ mod }}"></span>
        {{ mod }}
      </a>
      {% empty %}
      <p class="text-muted px-2 py-2" style="font-size:0.8rem">No modules found in config dir.</p>
      {% endfor %}
    </div>
  </nav>

  <main class="main-content flex-grow-1 p-4">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function getCsrfToken() {
  return document.cookie.split(';')
    .map(c => c.trim())
    .find(c => c.startsWith('csrftoken='))
    ?.replace('csrftoken=', '') || '';
}

async function refreshSidebarStatus() {
  try {
    const resp = await fetch("{% url 'api_all_statuses' %}");
    const data = await resp.json();
    data.modules.forEach(m => {
      document.querySelectorAll(`.status-dot[data-module="${m.name}"]`).forEach(dot => {
        dot.className = `status-dot ${m.status}`;
      });
    });
  } catch (_) {}
}

refreshSidebarStatus();
setInterval(refreshSidebarStatus, 8000);

// Preserve the active tab hash when navigating between modules
document.querySelectorAll('.sidebar-link[href^="/modules/"]').forEach(link => {
  link.addEventListener('click', function (e) {
    if (location.hash) {
      e.preventDefault();
      window.location.href = this.getAttribute('href').split('#')[0] + location.hash;
    }
  });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
